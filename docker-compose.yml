version: "3.9"

services:
  # ── PostgreSQL Veritabanı ─────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fatura_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-fatura_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-fatura_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fatura_user} -d ${DB_NAME:-fatura_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fatura_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-fatura_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-fatura_db}
      APP_ENV: production
      DEBUG: "false"
    volumes:
      - uploads_data:/app/uploads
      - archive_data:/app/archive
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo '🔄 Tablolar oluşturuluyor...' &&
        python -c 'import asyncio; from app.database import create_tables; asyncio.run(create_tables())' &&
        echo '🔧 Admin kullanıcı kontrol ediliyor...' &&
        python -m scripts.seed_admin --email ${ADMIN_EMAIL} --name 'Sistem Yöneticisi' --password ${ADMIN_PASSWORD} &&
        echo '🚀 Backend başlatılıyor...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "

  # ── React Frontend + Nginx ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: fatura_frontend
    restart: unless-stopped
    depends_on:
      - backend

  # ── Nginx Reverse Proxy (SSL) ─────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: fatura_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

  # ── Certbot (SSL sertifikası) ─────────────────────────
  certbot:
    image: certbot/certbot
    container_name: fatura_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  uploads_data:
  archive_data:
  certbot_www:
  certbot_conf:
