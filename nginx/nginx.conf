# =============================================
# Nginx Reverse Proxy — E-Fatura Sistemi
# Domain: DOMAIN_ADI ile değiştirin
# =============================================

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    server_name DOMAIN_ADI www.DOMAIN_ADI;

    # Let's Encrypt doğrulama
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Diğer tüm istekleri HTTPS'e yönlendir
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Ana sunucu
server {
    listen 443 ssl http2;
    server_name DOMAIN_ADI www.DOMAIN_ADI;

    # SSL Sertifikaları (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_ADI/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_ADI/privkey.pem;

    # SSL Güvenlik Ayarları
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Dosya yükleme boyutu
    client_max_body_size 25M;

    # ── API Backend ───────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── FastAPI Docs (opsiyonel — production'da kapatabilirsin) ───
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── React Frontend ────────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Statik dosyalar için cache
        location /assets/ {
            proxy_pass http://frontend:3000/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
